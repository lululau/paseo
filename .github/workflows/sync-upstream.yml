name: Sync Upstream Release

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      tag:
        description: '指定要同步的上游 tag（如 v0.1.55）'
        required: false
        type: string

concurrency:
  group: sync-upstream
  cancel-in-progress: false

env:
  UPSTREAM_REPO: getpaseo/paseo
  UPSTREAM_URL: https://github.com/getpaseo/paseo.git
  FORK_REMOTE: lx
  CHERRY_PICK_COMMIT: fa4621074a14a3a4e4c2b2353a9a7ddcddeb7731

jobs:
  check-new-release:
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.check.outputs.new_tag }}
      has_new: ${{ steps.check.outputs.has_new }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for new upstream release
        id: check
        run: |
          set -euo pipefail

          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
            echo "Using manually specified tag: $TAG"
          else
            # Fetch all upstream tags
            git fetch --tags "$UPSTREAM_URL"

            # Get latest non-prerelease v* tag
            TAG=$(git tag -l 'v*' --sort=-v:refname | grep -v -E -- '-(rc|alpha|beta)' | head -1)

            if [ -z "$TAG" ]; then
              echo "No upstream release tags found"
              echo "has_new=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          # Check if this tag already exists in our fork
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists in fork, skipping"
            echo "has_new=false" >> "$GITHUB_OUTPUT"
          else
            echo "New upstream release: $TAG"
            echo "new_tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "has_new=true" >> "$GITHUB_OUTPUT"
          fi

  create-version-branch:
    needs: check-new-release
    if: needs.check-new-release.outputs.has_new == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_tag: ${{ needs.check-new-release.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream tag
        run: |
          set -euo pipefail
          TAG="${{ needs.check-new-release.outputs.new_tag }}"
          git fetch --tags "$UPSTREAM_URL" "$TAG"

      - name: Create version branch
        run: |
          set -euo pipefail
          TAG="${{ needs.check-new-release.outputs.new_tag }}"

          # Create branch from upstream tag (use release/ prefix to avoid conflict with tag name)
          BRANCH="release/$TAG"
          git checkout -b "$BRANCH" "tags/$TAG"

      - name: Cherry-pick model mapping commit
        run: |
          set -euo pipefail

          if ! git cherry-pick "$CHERRY_PICK_COMMIT" --no-commit; then
            echo "::error::Cherry-pick conflict detected! Manual resolution needed."
            echo "Conflicting files:"
            git diff --name-only --diff-filter=U
            git cherry-pick --abort
            exit 1
          fi

          git commit -m "feat: add model mapping support for Claude provider (cherry-picked from model-map-base)"

      - name: Rename npm scope @getpaseo -> @lululau/paseo
        run: |
          set -euo pipefail
          find . -type f \
            -not -path './.git/*' \
            -not -path './node_modules/*' \
            -not -path './.github/workflows/*' \
            -exec sed -i "s/@getpaseo\//@lululau\/paseo-/g" {} +

      - name: Patch desktop build to reduce memory pressure
        run: |
          set -euo pipefail
          # Split desktop build: daemon packages are built separately in desktop-release workflow
          # with increased heap, so remove build:daemon from the desktop build script to avoid OOM
          DESKTOP_PKG="packages/desktop/package.json"
          node -e "
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('$DESKTOP_PKG', 'utf8'));
          // Remove 'npm --prefix ../.. run build:daemon && ' prefix from build script
          pkg.scripts.build = pkg.scripts.build.replace('npm --prefix ../.. run build:daemon && ', '');
          fs.writeFileSync('$DESKTOP_PKG', JSON.stringify(pkg, null, 2) + '\n');
          console.log('Patched build script:', pkg.scripts.build);
          "

      - name: Regenerate lockfile with correct registry
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: |
          # Delete and regenerate lockfile. The upstream lockfile has resolved URLs
          # pointing to npm.pkg.github.com/@boudra/ which doesn't exist for @lululau.
          # npm install --ignore-scripts will resolve from npmjs.org (the default).
          rm -f package-lock.json
          npm install --ignore-scripts

      - name: Commit scope rename
        run: |
          set -euo pipefail
          TAG="${{ needs.check-new-release.outputs.new_tag }}"
          git add -A
          git commit -m "chore: rename scope @getpaseo -> @lululau/paseo for $TAG" || echo "No changes to commit"

      - name: Push branch and tag
        run: |
          set -euo pipefail
          TAG="${{ needs.check-new-release.outputs.new_tag }}"
          BRANCH="release/$TAG"

          git remote add fork "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" || true
          git push fork "$BRANCH"
          git push fork "$TAG:$TAG"

      - name: Notify failure on error
        if: failure()
        run: |
          TAG="${{ needs.check-new-release.outputs.new_tag }}"
          echo "::error::Upstream sync failed for $TAG. Check logs for details."

  publish-npm:
    needs: create-version-branch
    runs-on: macos-14
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: release/${{ needs.create-version-branch.outputs.new_tag }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build daemon packages (each in separate process to avoid OOM)
        run: |
          npm run build --workspace=@lululau/paseo-highlight
          npm run build --workspace=@lululau/paseo-relay
          npm run build --workspace=@lululau/paseo-server
          npm run build --workspace=@lululau/paseo-cli

      - name: Switch registry for publishing
        run: |
          # .npmrc was set to npm.pkg.github.com by setup-node for install.
          # Switch to npmjs.org for publishing (token comes from NPM_TOKEN secret).
          echo "@lululau:registry=https://registry.npmjs.org/" > .npmrc
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" >> .npmrc

      - name: Publish @lululau/paseo-highlight
        run: npm publish --workspace=@lululau/paseo-highlight --access public
        continue-on-error: true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @lululau/paseo-relay
        run: npm publish --workspace=@lululau/paseo-relay --access public
        continue-on-error: true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @lululau/paseo-server
        run: npm publish --workspace=@lululau/paseo-server --access public
        continue-on-error: true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @lululau/paseo-cli
        run: npm publish --workspace=@lululau/paseo-cli --access public
        continue-on-error: true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Trigger desktop release build
        if: always() && needs.create-version-branch.result == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run desktop-release.yml \
            -f tag="${{ needs.create-version-branch.outputs.new_tag }}" \
            --ref main

name: Server CI

on:
  push:
    branches: [main]
    paths:
      - 'packages/server/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/server-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'packages/server/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/server-ci.yml'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Fetch origin/main (worktree tests)
        run: git fetch --no-tags origin main:refs/remotes/origin/main

      - name: Install server dependencies
        run: npm install --workspace=@lululau/paseo-server --include-workspace-root

      - name: Build highlight dependency
        run: npm run build --workspace=@lululau/paseo-highlight

      - name: Build relay dependency
        run: npm run build --workspace=@lululau/paseo-relay

      - name: Typecheck
        run: npm run typecheck --workspace=@lululau/paseo-server

      - name: Test
        run: npm run test --workspace=@lululau/paseo-server
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
